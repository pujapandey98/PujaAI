<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JivaBot — Farm Device Selector</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #4a7c59;
    --sage-light: #d4e8da;
    --sage-mid: #7aaa8a;
    --earth: #8b5e3c;
    --earth-light: #f5ede6;
    --cream: #faf8f3;
    --ink: #1c1c1a;
    --ink-muted: #5a5a54;
    --ink-faint: #9a9a92;
    --surface: #ffffff;
    --border: rgba(28,28,26,0.1);
    --border-strong: rgba(28,28,26,0.2);
    --puja-bubble: #f0f6f2;
    --user-bubble: #1c1c1a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--sage) 0%, var(--sage-mid) 100%);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px; color: white; font-weight: 600; letter-spacing: -0.5px;
  }
  .brand-text { display: flex; flex-direction: column; }
  .brand-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: var(--ink); line-height: 1; }
  .brand-tag { font-size: 11px; color: var(--ink-faint); font-weight: 400; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: #f0f6f2; border: 1px solid #c8dece; border-radius: 100px;
    padding: 6px 14px; font-size: 12px; color: var(--sage); font-weight: 500;
  }
  .status-dot { width: 6px; height: 6px; background: var(--sage); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── MAIN ── */
  main { flex: 1; display: flex; flex-direction: column; max-width: 780px; width: 100%; margin: 0 auto; padding: 0 1rem; }

  /* ── CHAT ── */
  #chat-container {
    flex: 1; padding: 2rem 0 1rem;
    display: flex; flex-direction: column; gap: 1.5rem;
    min-height: calc(100vh - 68px - 160px);
    overflow-y: auto;
  }

  .message-row { display: flex; gap: 12px; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; margin-top: 2px;
  }
  .avatar.puja { background: linear-gradient(135deg, var(--sage) 0%, var(--sage-mid) 100%); color: white; font-family: 'Playfair Display', serif; }
  .avatar.user { background: var(--earth-light); color: var(--earth); }

  .bubble-wrap { display: flex; flex-direction: column; gap: 6px; max-width: 78%; }
  .message-row.user .bubble-wrap { align-items: flex-end; }

  .bubble { padding: 14px 18px; border-radius: var(--radius); font-size: 15px; line-height: 1.65; color: var(--ink); background: var(--puja-bubble); border: 1px solid var(--border); }
  .message-row.user .bubble { background: var(--user-bubble); color: white; border-color: transparent; border-bottom-right-radius: 4px; }
  .bubble.puja { border-bottom-left-radius: 4px; }
  .bubble strong { font-weight: 600; color: var(--sage); }
  .message-row.user .bubble strong { color: rgba(255,255,255,0.8); }

  .sender-label { font-size: 11px; color: var(--ink-faint); font-weight: 500; letter-spacing: 0.3px; padding: 0 4px; }

  /* ── OPTIONS ── */
  .options-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .option-btn {
    background: var(--surface); border: 1.5px solid var(--border-strong);
    border-radius: 100px; padding: 9px 20px;
    font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--ink);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .option-btn:hover { border-color: var(--sage); background: var(--sage-light); color: var(--sage); transform: translateY(-1px); }
  .option-btn:active { transform: translateY(0); }
  .option-btn.selected { border-color: var(--sage); background: var(--sage); color: white; }

  /* ── INLINE INPUT ── */
  .inline-input-wrap { display: flex; gap: 8px; margin-top: 4px; }
  .inline-input {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border-strong);
    border-radius: 100px; padding: 9px 18px;
    font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--ink);
    outline: none; transition: border-color 0.2s;
  }
  .inline-input:focus { border-color: var(--sage); }
  .inline-input::placeholder { color: var(--ink-faint); }
  .inline-submit {
    background: var(--sage); color: white; border: none; border-radius: 100px;
    padding: 9px 20px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .inline-submit:hover { background: #3d6b4a; }

  /* ── DISTANCE UNIT TOGGLE ── */
  .unit-toggle-wrap { margin-top: 4px; }
  .unit-toggle-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .unit-toggle-label { font-size: 12px; color: var(--ink-faint); font-weight: 500; }
  .unit-toggle {
    display: flex; background: var(--cream); border: 1.5px solid var(--border-strong);
    border-radius: 100px; overflow: hidden; padding: 3px;
  }
  .unit-btn {
    border: none; background: transparent; border-radius: 100px;
    padding: 4px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    font-weight: 600; color: var(--ink-faint); cursor: pointer; transition: all 0.2s;
  }
  .unit-btn.active { background: var(--sage); color: white; }

  /* ── RESULT CARD ── */
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-top: 4px; }
  .result-header { background: linear-gradient(135deg, var(--sage) 0%, var(--sage-mid) 100%); padding: 20px 24px; color: white; }
  .result-device { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .result-sub { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .result-body { padding: 0; display: flex; flex-direction: column; }

  /* ── TABS ── */
  .result-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .result-tab {
    flex: 1; padding: 14px 10px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 600;
    color: var(--ink-faint); background: transparent; border: none;
    cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .result-tab:hover { color: var(--sage); background: var(--sage-light); }
  .result-tab.active { color: var(--sage); border-bottom-color: var(--sage); background: #f6fbf8; }
  .result-tab .tab-icon { font-size: 15px; }

  .tab-content { display: none; padding: 20px 24px; }
  .tab-content.active { display: flex; flex-direction: column; gap: 16px; }

  /* ── METRICS ── */
  .metrics-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .metric-box { background: var(--cream); border-radius: 12px; padding: 12px 14px; text-align: center; }
  .metric-val { font-size: 18px; font-weight: 600; color: var(--sage); font-family: 'Playfair Display', serif; }
  .metric-label { font-size: 11px; color: var(--ink-faint); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }

  .confidence-bar-wrap { display: flex; flex-direction: column; gap: 6px; }
  .confidence-label-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink-muted); }
  .confidence-bar { height: 8px; background: var(--sage-light); border-radius: 100px; overflow: hidden; }
  .confidence-fill { height: 100%; background: linear-gradient(90deg, var(--sage) 0%, var(--sage-mid) 100%); border-radius: 100px; transition: width 1s ease; }

  .result-explanation {
    font-size: 14px; line-height: 1.7; color: var(--ink-muted);
    background: var(--earth-light); border-radius: 12px; padding: 14px 16px;
  }

  .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btn {
    flex: 1; min-width: 120px; padding: 11px 16px; border-radius: 100px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.2s; border: 1.5px solid;
  }
  .action-btn.primary { background: var(--sage); color: white; border-color: var(--sage); }
  .action-btn.primary:hover { background: #3d6b4a; }
  .action-btn.secondary { background: transparent; color: var(--ink); border-color: var(--border-strong); }
  .action-btn.secondary:hover { background: var(--sage-light); border-color: var(--sage); color: var(--sage); }

  /* ── FAQ TAB ── */
  .faq-item { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .faq-q {
    width: 100%; text-align: left; background: var(--cream);
    border: none; padding: 14px 16px;
    font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600;
    color: var(--ink); cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    transition: background 0.2s;
  }
  .faq-q:hover { background: var(--sage-light); }
  .faq-q.open { background: var(--sage-light); color: var(--sage); }
  .faq-q .faq-chevron { transition: transform 0.3s; font-size: 12px; color: var(--ink-faint); }
  .faq-q.open .faq-chevron { transform: rotate(180deg); color: var(--sage); }
  .faq-a { display: none; padding: 12px 16px; font-size: 13px; line-height: 1.7; color: var(--ink-muted); background: white; border-top: 1px solid var(--border); }
  .faq-a.open { display: block; }

  /* ── PAYMENTS TAB ── */
  .payment-option {
    display: flex; align-items: flex-start; gap: 14px;
    border: 1.5px solid var(--border); border-radius: 14px; padding: 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .payment-option:hover { border-color: var(--sage); background: #f6fbf8; }
  .payment-option.selected { border-color: var(--sage); background: #f6fbf8; }
  .payment-icon { font-size: 26px; flex-shrink: 0; }
  .payment-info h4 { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .payment-info p { font-size: 12px; color: var(--ink-faint); line-height: 1.5; }
  .payment-badge {
    display: inline-block; background: var(--sage-light); color: var(--sage);
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    border-radius: 100px; padding: 2px 8px; margin-top: 4px;
  }
  .emi-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .emi-table th { background: var(--sage); color: white; padding: 9px 12px; text-align: left; font-weight: 600; }
  .emi-table th:first-child { border-radius: 8px 0 0 0; }
  .emi-table th:last-child { border-radius: 0 8px 0 0; }
  .emi-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--ink-muted); }
  .emi-table tr:last-child td { border-bottom: none; }
  .emi-table tr:nth-child(even) td { background: var(--cream); }

  /* ── PDF TAB ── */
  /* CHANGE 2 & 3: PDF preview styles replacing "coming soon" */
  .pdf-preview-wrap {
    display: flex; flex-direction: column; gap: 12px;
  }
  .pdf-preview-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cream); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 16px;
  }
  .pdf-preview-title {
    font-size: 14px; font-weight: 600; color: var(--ink);
  }
  .pdf-export-btn {
    flex: 0 !important; min-width: auto !important;
    padding: 9px 20px !important; font-size: 13px !important;
    white-space: nowrap;
  }
  /* Scaled iframe wrapper — proposal-template.html is A4 (210mm ≈ 794px wide).
     We scale it down to fit snugly inside the card. */
  .pdf-iframe-scaler {
    width: 100%;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #fff;
    /* height = iframe natural height × scale factor */
    height: 420px;
  }
  .pdf-iframe {
    width: 794px;           /* A4 natural pixel width */
    height: 1123px;         /* A4 natural pixel height */
    border: none;
    transform-origin: top left;
    transform: scale(0.53); /* 53% → fits ~420px tall in the card */
    display: block;
  }

  /* ── RESTART BUTTON (outside card) ── */
  /* CHANGE 1: Start over button outside result-card */
  .restart-btn-outer {
    display: flex; justify-content: center; margin-top: 8px; margin-bottom: 4px;
  }
  .restart-btn-outer .action-btn {
    flex: 0; min-width: 140px; max-width: 200px;
  }

  /* ── TYPING ── */
  .typing-indicator {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 16px; background: var(--puja-bubble); border: 1px solid var(--border);
    border-radius: var(--radius); border-bottom-left-radius: 4px; width: fit-content;
  }
  .typing-dot { width: 7px; height: 7px; background: var(--sage-mid); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  /* ── INPUT BAR ── */
  #input-bar { position: sticky; bottom: 0; background: var(--cream); padding: 1rem 0 1.5rem; border-top: 1px solid var(--border); }
  .input-row {
    display: flex; gap: 10px; align-items: center;
    background: var(--surface); border: 1.5px solid var(--border-strong);
    border-radius: 100px; padding: 8px 8px 8px 20px; transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--sage); }
  #user-input { flex: 1; border: none; outline: none; font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--ink); background: transparent; }
  #user-input::placeholder { color: var(--ink-faint); }
  #send-btn {
    width: 40px; height: 40px; background: var(--sage); border: none; border-radius: 50%;
    color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }
  #send-btn:hover { background: #3d6b4a; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn svg { width: 18px; height: 18px; }
  .input-hint { text-align: center; font-size: 11px; color: var(--ink-faint); margin-top: 8px; letter-spacing: 0.3px; }

  /* ── DIVIDER ── */
  .chat-divider { display: flex; align-items: center; gap: 12px; padding: 0 4px; }
  .chat-divider span { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; }
  .chat-divider::before, .chat-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .metrics-row { grid-template-columns: 1fr 1fr; }
    .result-tab { font-size: 12px; padding: 12px 6px; }
    .result-tab .tab-label { display: none; }
    .result-tab .tab-icon { font-size: 18px; }
    .pdf-iframe-scaler { height: 300px; }
    .pdf-iframe { transform: scale(0.38); }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">P</div>
    <div class="brand-text">
      <span class="brand-name">JivaBot</span>
      <span class="brand-tag">Farm Device Advisor</span>
    </div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    Online
  </div>
</header>

<main>
  <div id="chat-container"></div>
  <div id="input-bar">
    <div class="input-row">
      <input id="user-input" type="text" placeholder="Type a message or select an option above..." autocomplete="off" />
      <button id="send-btn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">JivaBot · Powered by Anthropic · Farm device recommendations only</p>
  </div>
</main>

<script>
const PUMP_DB = {
  SHAKTI: {
    MONOBLOCK: { "0.5":{ratedHead:20,ratedDischarge:60},"1":{ratedHead:30,ratedDischarge:80},"1.5":{ratedHead:35,ratedDischarge:100},"2":{ratedHead:40,ratedDischarge:130},"3":{ratedHead:50,ratedDischarge:160},"7":{ratedHead:65,ratedDischarge:220},"10":{ratedHead:80,ratedDischarge:300},"15":{ratedHead:100,ratedDischarge:420} },
    SUBMERSIBLE: { "0.5":{ratedHead:40,ratedDischarge:40},"1":{ratedHead:55,ratedDischarge:60},"1.5":{ratedHead:70,ratedDischarge:80},"2":{ratedHead:90,ratedDischarge:100},"3":{ratedHead:110,ratedDischarge:130},"5":{ratedHead:150,ratedDischarge:180},"7":{ratedHead:180,ratedDischarge:230},"10":{ratedHead:220,ratedDischarge:310},"15":{ratedHead:270,ratedDischarge:430} }
  },
  TEXMO: {
    MONOBLOCK: { "0.5":{ratedHead:18,ratedDischarge:55},"1":{ratedHead:28,ratedDischarge:75},"1.5":{ratedHead:33,ratedDischarge:95},"2":{ratedHead:38,ratedDischarge:120},"3":{ratedHead:48,ratedDischarge:150},"7":{ratedHead:63,ratedDischarge:210},"10":{ratedHead:78,ratedDischarge:290},"15":{ratedHead:96,ratedDischarge:405} },
    SUBMERSIBLE: { "0.5":{ratedHead:38,ratedDischarge:38},"1":{ratedHead:52,ratedDischarge:58},"1.5":{ratedHead:65,ratedDischarge:75},"2":{ratedHead:85,ratedDischarge:95},"3":{ratedHead:105,ratedDischarge:125},"5":{ratedHead:145,ratedDischarge:170},"7":{ratedHead:175,ratedDischarge:225},"10":{ratedHead:215,ratedDischarge:300},"15":{ratedHead:265,ratedDischarge:420} }
  },
  KIRLOSKAR: {
    MONOBLOCK: { "0.5":{ratedHead:22,ratedDischarge:65},"1":{ratedHead:32,ratedDischarge:85},"1.5":{ratedHead:38,ratedDischarge:105},"2":{ratedHead:44,ratedDischarge:135},"3":{ratedHead:55,ratedDischarge:165},"7":{ratedHead:68,ratedDischarge:225},"10":{ratedHead:85,ratedDischarge:310},"15":{ratedHead:105,ratedDischarge:430} },
    SUBMERSIBLE: { "0.5":{ratedHead:42,ratedDischarge:42},"1":{ratedHead:58,ratedDischarge:62},"1.5":{ratedHead:75,ratedDischarge:85},"2":{ratedHead:95,ratedDischarge:105},"3":{ratedHead:115,ratedDischarge:135},"5":{ratedHead:155,ratedDischarge:185},"7":{ratedHead:185,ratedDischarge:235},"10":{ratedHead:225,ratedDischarge:315},"15":{ratedHead:275,ratedDischarge:435} }
  },
  OSWAL: {
    MONOBLOCK: { "0.5":{ratedHead:19,ratedDischarge:58},"1":{ratedHead:29,ratedDischarge:78},"1.5":{ratedHead:34,ratedDischarge:98},"2":{ratedHead:39,ratedDischarge:125},"3":{ratedHead:49,ratedDischarge:155},"7":{ratedHead:64,ratedDischarge:215},"10":{ratedHead:79,ratedDischarge:295},"15":{ratedHead:98,ratedDischarge:415} },
    SUBMERSIBLE: { "0.5":{ratedHead:39,ratedDischarge:39},"1":{ratedHead:53,ratedDischarge:59},"1.5":{ratedHead:67,ratedDischarge:77},"2":{ratedHead:87,ratedDischarge:97},"3":{ratedHead:107,ratedDischarge:127},"5":{ratedHead:147,ratedDischarge:172},"7":{ratedHead:178,ratedDischarge:228},"10":{ratedHead:218,ratedDischarge:305},"15":{ratedHead:268,ratedDischarge:425} }
  }
};

const FRICTION_FACTORS = { "1": 0.12, "1.5": 0.07, "2": 0.04 };

const state = {
  step: "start",
  pumpType: null, brand: null, hp: null, pumpData: null,
  boreDepth: null, distance: null, pipeDiameter: null,
  assumptions: [], conversationHistory: [],
  lastRec: null
};

const chat = document.getElementById("chat-container");
const userInput = document.getElementById("user-input");

function normalizeBrand(raw) {
  const r = raw.toLowerCase().trim();
  if (r.includes("shakti") || r.includes("shakthi")) return "SHAKTI";
  if (r.includes("texmo") || r.includes("taro")) return "TEXMO";
  if (r.includes("kirloskar")) return "KIRLOSKAR";
  if (r.includes("oswal")) return "OSWAL";
  return null;
}

function getPumpData(brand, type, hp) {
  const db = PUMP_DB[brand]?.[type];
  if (!db) return null;
  if (db[hp]) return { ...db[hp], exact: true };
  const hpNum = parseFloat(hp);
  const keys = Object.keys(db).map(Number).sort((a,b)=>a-b);
  let closest = keys.reduce((a,b) => Math.abs(b-hpNum) < Math.abs(a-hpNum) ? b : a);
  return { ...db[closest.toString()], exact: false, usedHp: closest };
}

function calcTDH(boreDepth, distance, pipeDia) {
  const staticHead = boreDepth;
  const totalLength = boreDepth + distance;
  const frictionLoss = totalLength * FRICTION_FACTORS[pipeDia];
  const minorLoss = (staticHead + frictionLoss) * 0.10;
  return { tdh: staticHead + frictionLoss + minorLoss, staticHead, frictionLoss, minorLoss };
}

function calcDischarge(tdh, pumpData) {
  if (tdh <= 0) return pumpData.ratedDischarge;
  const ratio = pumpData.ratedHead / tdh;
  return pumpData.ratedDischarge * Math.min(ratio, 1.1);
}

function getDevice(lph) {
  if (lph <= 9000) return { name: "Vipasa", size: '1"', link: "#vipasa" };
  if (lph <= 30000) return { name: "Jhanavi", size: '2"', link: "#jhanavi" };
  if (lph <= 50000) return { name: "Dihanga", size: '3"', link: "#dihanga" };
  return null;
}

function calcConfidence() {
  let score = 100;
  for (const a of state.assumptions) {
    if (a === "model_assumed") score -= 15;
    if (a === "bore_estimated") score -= 10;
    if (a === "pipe_estimated") score -= 10;
    if (a === "distance_estimated") score -= 10;
    if (a === "tdh_exceeds") score -= 15;
  }
  return Math.max(0, score);
}

function confidenceLabel(s) {
  if (s >= 85) return "High Confidence";
  if (s >= 70) return "Medium Confidence";
  return "Low — please verify inputs";
}

async function askHP() {
  await pujaSpeak(`Good choice! What is the <strong>horsepower (HP)</strong> of your ${state.brand} pump?`, 600);
  addOptionsWithTextInput(
    [
      {label:"3 HP", value:"3"},
      {label:"5 HP", value:"5"},

      {label:"10 HP", value:"10"},
      {label:"15 HP", value:"15"}
    ],

    async (val) => {
      const hpClean = val.replace(/\s*hp\s*/i, "").trim();
      const hpNum = parseFloat(hpClean);
      if (isNaN(hpNum) || hpNum <= 0) {
        await pujaSpeak(`Please enter a valid HP number.`);
        await askHP(); return;
      }
      state.hp = String(hpNum);
      state.step = "resolving";
      await resolvePump();

async function resolvePump() {
  const data = getPumpData(state.brand, state.pumpType, state.hp);
  if (!data) {
    await pujaSpeak(`I couldn't find a match for <strong>${state.brand} ${state.hp} HP ${state.pumpType}</strong> in my database. Let me estimate from nearest data.`);
    state.assumptions.push("model_assumed");
    const hp = parseFloat(state.hp) || 2;
    const ratedHead = hp * 30; const ratedDischarge = hp * 45;
    state.pumpData = { ratedHead, ratedDischarge, exact: false };
    await pujaSpeak(`Using estimated specs — Rated head: <strong>${ratedHead} m</strong>, Discharge: <strong>${ratedDischarge} LPM</strong>.`);
    addDivider("Field Information");
    await askBoreDepth(); return;
  }
  if (!data.exact) {
    state.assumptions.push("model_assumed");
    await pujaSpeak(`Closest match found — <strong>${state.brand} ${data.usedHp} HP ${state.pumpType}</strong> (assumed). Rated head: <strong>${data.ratedHead} m</strong>, Rated discharge: <strong>${data.ratedDischarge} LPM</strong>.`);
  } else {
    await pujaSpeak(`Found it! <strong>${state.brand} ${state.hp} HP ${state.pumpType}</strong> — Rated head: <strong>${data.ratedHead} m</strong>, Rated discharge: <strong>${data.ratedDischarge} LPM</strong>.`);
  }
  state.pumpData = data;
  addDivider("Field Information");
  await delay(300);
  await askBoreDepth();
}

      await pujaSpeak(`Please type the exact bore depth in metres:`);
      addInlineInput("e.g. 135", "m", async (v) => {

        <div class="tab-content" id="${cardId}-pdf">
          <div class="pdf-preview-wrap">
            <div class="pdf-preview-toolbar">
              <span class="pdf-preview-title">📄 Proposal Preview — ${device.name}</span>
              <button class="action-btn primary pdf-export-btn" onclick="exportProposalPDF('${cardId}-proposalFrame')">⬇ Export to PDF</button>
            </div>
            <div class="pdf-iframe-scaler">
              <iframe
                id="${cardId}-proposalFrame"
                src="proposal-template.html"
                class="pdf-iframe"
                onload="injectProposalData('${cardId}-proposalFrame', '${cardId}')"
              ></iframe>
            </div>
          </div>
        </div>

      </div>
    </div>
  `;

  // Store proposal data on the card element for retrieval by injectProposalData
  card.dataset.proposal = JSON.stringify(proposalData);
  card.id = cardId + "-row";

  chat.appendChild(card);

  // CHANGE 1: "Start over" button appended OUTSIDE the result-card, after the card row
  const restartWrap = document.createElement("div");
  restartWrap.className = "restart-btn-outer";
  restartWrap.innerHTML = `<button class="action-btn secondary" onclick="restartFlow()">↩ Start over</button>`;
  chat.appendChild(restartWrap);

  scrollBottom(card);
  state.step = "done";
  userInput.placeholder = "Ask a follow-up question...";
}

// CHANGE 4: Inject proposal data into iframe via fillProposal()
function injectProposalData(frameId, cardId) {
  const frame = document.getElementById(frameId);
  if (!frame) return;

  // Retrieve proposal data stored on the card's parent row element
  const cardRow = document.getElementById(cardId + "-row");
  let data = {};
  if (cardRow && cardRow.dataset.proposal) {
    try { data = JSON.parse(cardRow.dataset.proposal); } catch(e) {}
  }

  // Try calling fillProposal inside the iframe
  try {
    if (frame.contentWindow && typeof frame.contentWindow.fillProposal === "function") {
      frame.contentWindow.fillProposal(data);
    }
  } catch(e) {
    // Cross-origin or not yet ready — silently ignore
    console.warn("Could not inject proposal data:", e);
  }
}

// CHANGE 3: Export iframe contents to PDF via browser print
function exportProposalPDF(frameId) {
  const frame = document.getElementById(frameId);
  if (!frame || !frame.contentWindow) return;
  try {
    frame.contentWindow.focus();
    frame.contentWindow.print();
  } catch(e) {
    // Fallback: open template in new tab for printing
    window.open("proposal-template.html", "_blank");
  }
}

function buildFAQ(deviceName, lph, tdh, hp, brand) {
  const faqs = [
    { q: `Why was the ${deviceName} recommended?`, a: `The ${deviceName} is matched to your calculated flow rate of ${lph.toLocaleString()} LPH. Each device in the JivaBot line covers a specific flow range — Vipasa up to 9,000 LPH, Jhanavi up to 30,000 LPH, and Dihanga up to 50,000 LPH.` },
    { q: "What does TDH mean?", a: `Total Dynamic Head (TDH = ${Math.round(tdh)} m in your case) is the total pressure your pump must overcome — including the static depth of the bore, friction in pipes, and minor fittings losses. A higher TDH reduces the effective discharge.` },
    { q: "Can I use the device with a different pump?", a: `Yes, the ${deviceName} is compatible with any pump achieving a similar discharge (${lph.toLocaleString()} LPH ± 20%). If you upgrade or change your pump, we recommend re-running the calculation.` },
    { q: "What is the installation time?", a: `Standard installation takes 4–8 hours depending on field layout and pipe routing. JivaBot offers on-site installation support in most districts — contact your local dealer for availability.` },
    { q: "Is this suitable for drip irrigation?", a: `Yes. The ${deviceName} is designed to integrate with drip, sprinkler, and flood irrigation systems. The appropriate device size ensures stable pressure for drip emitters and sprinkler heads.` },
    { q: "What warranty is offered?", a: `All JivaBot devices come with a 2-year manufacturing warranty and optional extended warranty of 3+2 years. Covers defects in materials and workmanship under normal field conditions.` }
  ];
  return faqs.map(f => `
    <div class="faq-item">
      <button class="faq-q" onclick="toggleFAQ(this)" aria-expanded="false">
        ${f.q}<span class="faq-chevron">▼</span>
      </button>
      <div class="faq-a">${f.a}</div>
    </div>
  `).join("");
}

function toggleFAQ(btn) {
  const ans = btn.nextElementSibling;
  const isOpen = btn.classList.contains("open");
  btn.classList.toggle("open", !isOpen);
  ans.classList.toggle("open", !isOpen);
  btn.setAttribute("aria-expanded", String(!isOpen));
}

function switchTab(cardId, tab) {
  const card = document.getElementById(cardId);
  card.querySelectorAll(".result-tab").forEach(t => t.classList.remove("active"));
  card.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  const tabs = card.querySelectorAll(".result-tab");
  const tabMap = ["summary","faq","payments","pdf"];
  tabs[tabMap.indexOf(tab)]?.classList.add("active");
  const content = document.getElementById(`${cardId}-${tab}`);
  if (content) content.classList.add("active");
}

let selectedPaymentMethod = null;
function selectPayment(el, method) {
  el.closest(".result-card").querySelectorAll(".payment-option").forEach(p => p.classList.remove("selected"));
  el.classList.add("selected");
  selectedPaymentMethod = method;
  const emiTable = el.closest(".result-card").querySelector("[id$='-emi-table']");
  if (emiTable) emiTable.style.display = method === "emi" ? "block" : "none";
}

function proceedPayment(name) {
  const method = selectedPaymentMethod || "online";
  addMessage("user", `Proceed to payment for ${name} via ${method}`);
  pujaSpeak(`Great! Initiating <strong> Razorpay </strong> payment for the <strong>${name}</strong>. Our team will contact you shortly to finalise and confirm your order. 🌿`);

  window.open('https://pages.razorpay.com/jwfd1'+name.toLowerCase(), '_blank');
}

function orderDevice(name) {
  addMessage("user", `I'd like to order the ${name}`);
  pujaSpeak(`Excellent choice! 🌿 Redirecting you to the <strong>${name}</strong> order page. Our team will get in touch with you shortly to confirm the details and arrange delivery.`);
}

function askMoreQuestions() {
  addMessage("user", "I have more questions");
  pujaSpeak(`Of course! Feel free to ask me anything about the recommendation, the device specifications, or your field setup. I'm here to help.`);
  state.step = "freeform";
  userInput.placeholder = "Ask me anything...";
  userInput.focus();
}

function restartFlow() {
  addMessage("user", "Start over");
  Object.assign(state, { step:"start", pumpType:null, brand:null, hp:null, pumpData:null, boreDepth:null, distance:null, pipeDiameter:null, assumptions:[], conversationHistory:[], lastRec:null });
  addDivider("New Session");
  startFlow();
}

// ── FREEFORM AI ──

async function handleFreeform(text) {
  showTyping();
  state.conversationHistory.push({ role: "user", content: text });
  const context = `You are JivaBot, a friendly and knowledgeable farm device advisor. The user has completed a device recommendation session:
- Pump: ${state.brand || "unknown"} ${state.hp || ""}HP ${state.pumpType || ""}
- Bore depth: ${state.boreDepth}m, Distance to field: ${state.distance}m, Pipe: ${state.pipeDiameter} inch
- Recommended device: ${state.lastRec ? state.lastRec.device.name + ' ' + state.lastRec.device.size + ', flow ' + state.lastRec.lph + ' LPH, TDH ' + Math.round(state.lastRec.tdh) + 'm' : 'see earlier calculation'}
Answer follow-up questions helpfully. Stay focused on farm irrigation and the JivaBot product line (Vipasa 1", Jhanavi 2", Dihanga 3").`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: context, messages: state.conversationHistory })
    });
    const data = await res.json();
    const reply = data.content?.map(b => b.text || "").join("") || "I'm not sure — please try rephrasing.";
    state.conversationHistory.push({ role: "assistant", content: reply });
    hideTyping();
    addMessage("puja", reply.replace(/\n/g, "<br>"));
  } catch(e) {
    hideTyping();
    addMessage("puja", "Sorry, I couldn't reach the AI right now. Please try again in a moment.");
  }
}

// ── SEND HANDLER ──

async function handleSend() {
  const text = userInput.value.trim();
  if (!text) return;
  userInput.value = "";
  if (state.step === "freeform" || state.step === "done") {
    addMessage("user", text); state.step = "freeform";
    await handleFreeform(text);
  } else {
    addMessage("user", text);
    await pujaSpeak(`Please use the option buttons above to navigate the current step.`);
  }
}

userInput.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });
startFlow();
</script>
